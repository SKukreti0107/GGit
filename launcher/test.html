<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GGit - Connect MEGA Account</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f05032",
                        "background-light": "#f8f6f6",
                        "background-dark": "#090d14",
                        "glass-slate": "rgba(20, 26, 37, 0.73)",
                        "glass-border": "rgba(255, 255, 255, 0.08)",
                        "text-muted": "#8b949e",
                        "input-bg": "#0d1117",
                        "input-border": "#30363d",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "4px", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-card {
            background: rgba(20, 26, 37, 0.73);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glow-button {
            box-shadow: 0 0 20px -5px rgba(240, 80, 50, 0.5);
            transition: box-shadow 0.3s ease;
        }

        .glow-button:hover {
            box-shadow: 0 0 30px -5px rgba(240, 80, 50, 0.8);
        }
    </style>
</head>

<body
    class="bg-background-dark text-white min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Abstract Background Elements -->
    <div
        class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-500/10 blur-[120px] pointer-events-none">
    </div>
    <!-- Header / Nav Exception (Back to Main) -->
    <div class="absolute top-0 left-0 w-full p-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 text-primary">
                <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 6H42L36 24L42 42H6L12 24L6 6Z" fill="currentColor"></path>
                </svg>
            </div>
            <h2 class="text-xl font-display font-bold tracking-tight">GGit</h2>
        </div>
    </div>
    <main class="w-full max-w-md px-6 z-10 relative">
        <div class="glass-card rounded-xl p-8 shadow-2xl flex flex-col relative overflow-hidden">
            <!-- Subtle Top Accent line -->
            <div
                class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50">
            </div>
            <div class="flex justify-center mb-8">
                <div class="w-20 h-20 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                    <!-- MEGA Logo Placeholder (Using Material Icon as proxy for structure, typically an SVG logo would be here) -->
                    <span class="material-symbols-outlined text-4xl text-red-500" data-icon="cloud">cloud</span>
                </div>
            </div>
            <div class="text-center mb-8">
                <h1 class="text-3xl font-display font-bold tracking-tight mb-3">Connect MEGA</h1>
                <p class="text-text-muted text-sm leading-relaxed">
                    GGit uses Rclone to establish an encrypted tunnel to your MEGA storage.
                </p>
            </div>
            <form class="flex flex-col gap-5">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-medium text-gray-300" for="email">Email address</label>
                    <input
                        class="w-full bg-input-bg border border-input-border rounded px-4 py-3 text-white placeholder-text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors duration-200 font-sans"
                        id="email" placeholder="account@example.com" required="" type="email" />
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-medium text-gray-300" for="password">Password</label>
                    <div class="relative">
                        <input
                            class="w-full bg-input-bg border border-input-border rounded px-4 py-3 pr-12 text-white placeholder-text-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors duration-200 font-sans"
                            id="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute inset-y-0 right-0 px-4 flex items-center text-text-muted hover:text-white transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
                        </button>
                    </div>
                </div>
                <button
                    class="mt-4 w-full bg-primary hover:bg-red-600 text-white font-semibold py-3.5 px-4 rounded transition-all duration-200 glow-button font-display tracking-wide"
                    type="submit">
                    Authorize Connection
                </button>
            </form>
            <div class="mt-8 text-center">
                <a class="inline-flex items-center gap-2 text-sm text-text-muted hover:text-primary transition-colors duration-200"
                    href="#">
                    <span class="material-symbols-outlined text-base" data-icon="arrow_back">arrow_back</span>
                    Back to Dashboard
                </a>
            </div>
        </div>
        <!-- Security Footnote -->
        <div class="mt-8 text-center flex items-center justify-center gap-2 text-xs text-text-muted/60">
            <span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
            <span>End-to-end encrypted connection</span>
        </div>
    </main>
</body>

</html>
