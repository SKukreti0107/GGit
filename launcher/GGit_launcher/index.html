<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>GGit - Dashboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f04f33",
            "background-light": "#f8f6f6",
            "background-dark": "#090D14",
            "surface": "rgba(20, 26, 37, 0.73)",
            "surface-border": "#1E293B",
            "text-main": "#E2E8F0",
            "muted": "#64748B",
            "success": "#10B981",
            "warning": "#F59E0B"
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "mono": ["JetBrains Mono", "monospace"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "sm": "0.25rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
          boxShadow: {
            'glow-primary': '0 0 30px rgba(240, 79, 51, 0.15)',
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: theme('colors.background-dark');
      color: theme('colors.text-main');
      font-family: theme('fontFamily.body');
    }

    .glass-header {
      background-color: theme('colors.surface');
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-bottom: 1px solid theme('colors.surface-border');
    }

    .game-card {
      background-color: theme('colors.surface');
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid theme('colors.surface-border');
      transition: all 0.2s ease-in-out;
    }

    .game-card:hover {
      border-color: theme('colors.primary');
      box-shadow: theme('boxShadow.glow-primary');
      transform: translateY(-2px);
    }

    .terminal-dock {
      background-color: #000000;
      border-top: 1px solid theme('colors.surface-border');
    }

    .sync-progress {
      background: linear-gradient(90deg, transparent, theme('colors.primary'), transparent);
      background-size: 200% 100%;
      animation: progressLine 1.5s infinite linear;
    }

    @keyframes progressLine {
      0% {
        background-position: 100% 0;
      }

      100% {
        background-position: -100% 0;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
